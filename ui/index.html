<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #222;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #7eb8f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #reset-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #reset-btn:hover { color: #e07070; border-color: #e07070; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 75%;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #d6eaff;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
    }

    .msg.system {
      align-self: center;
      color: #555;
      font-size: 0.8rem;
      font-style: italic;
      background: none;
    }

    .tool-block {
      align-self: flex-start;
      font-size: 0.78rem;
      width: 100%;
      max-width: 90%;
    }

    .tool-block details {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      margin-bottom: 4px;
      overflow: hidden;
    }

    .tool-block summary {
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      user-select: none;
      list-style: none;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .tool-name  { color: #5db85d; flex-shrink: 0; }
    .tool-sep   { color: #333; flex-shrink: 0; }
    .tool-detail {
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .tool-block pre {
      padding: 0.5rem 0.7rem;
      color: #888;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      border-top: 1px solid #1a1a1a;
      font-size: 0.73rem;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      max-height: 220px;
      overflow-y: auto;
    }

    .tool-block pre.error { color: #e07070; }
    .tool-block pre.denied { color: #e07070; font-style: italic; }

    /* Diff view for edit_file */
    .diff-view {
      border-top: 1px solid #1a1a1a;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.73rem;
      max-height: 300px;
      overflow-y: auto;
      overflow-x: auto;
    }

    .diff-line {
      display: flex;
      align-items: baseline;
      padding: 0.08rem 0.5rem;
      line-height: 1.65;
    }

    .diff-removed { background: rgba(239, 68, 68, 0.1); }
    .diff-added   { background: rgba(74, 222, 128, 0.08); }

    .diff-sign {
      width: 1.2rem;
      flex-shrink: 0;
      font-size: 0.8rem;
    }
    .diff-removed .diff-sign { color: #f87171; }
    .diff-added   .diff-sign { color: #4ade80; }

    .diff-text { white-space: pre; }
    .diff-removed .diff-text { color: #fca5a5; }
    .diff-added   .diff-text { color: #86efac; }

    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #222;
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 200px;
    }

    #input:focus { border-color: #7eb8f7; }

    #send {
      background: #1a3a5c;
      color: #7eb8f7;
      border: none;
      border-radius: 8px;
      padding: 0 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #1e4a78; }
    #send:disabled { opacity: 0.5; cursor: default; }

    /* Goals panel */
    #goals-btn {
      font-size: 0.75rem;
      font-weight: 400;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #goals-btn:hover { color: #c8a060; border-color: #c8a060; }
    #goals-btn.has-active { color: #c8a060; border-color: #5a4020; }

    #goals-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 400px;
      height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid #222;
      flex-direction: column;
      z-index: 100;
    }
    #goals-panel.open { display: flex; }

    #goals-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      color: #c8a060;
      font-weight: 600;
    }

    #goals-panel-header .actions { display: flex; gap: 0.4rem; }

    #goals-new-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }

    #goals-new-input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #ccc;
      font-size: 0.78rem;
      padding: 0.3rem 0.5rem;
      font-family: inherit;
    }

    #goals-new-btn {
      font-size: 0.72rem;
      background: none;
      border: 1px solid #3a3020;
      border-radius: 4px;
      color: #c8a060;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
    }
    #goals-new-btn:hover { background: #1a1400; }

    #goals-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }

    .goal-item {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .goal-title {
      font-size: 0.82rem;
      color: #ddd;
      flex: 1;
      line-height: 1.3;
    }

    .goal-status {
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .goal-status.active     { background: #1a1400; color: #c8a060; }
    .goal-status.done       { background: #0d1a0d; color: #70a870; }
    .goal-status.cancelled  { background: #1a1010; color: #888; }

    .goal-desc {
      font-size: 0.74rem;
      color: #666;
      margin-top: 0.25rem;
      line-height: 1.4;
    }

    .goal-actions {
      display: flex;
      gap: 0.35rem;
      margin-top: 0.45rem;
    }

    .goal-btn {
      font-size: 0.7rem;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      padding: 0.18rem 0.5rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .goal-btn.execute { color: #c8a060; border-color: #5a4020; }
    .goal-btn.execute:hover { background: #1a1400; }
    .goal-btn.cancel  { color: #888; }
    .goal-btn.cancel:hover  { color: #e07070; border-color: #e07070; }
    .goal-btn:disabled { opacity: 0.4; cursor: default; }

    .goal-steps {
      margin-top: 0.5rem;
      font-size: 0.74rem;
      border-left: 2px solid #2a2010;
      padding-left: 0.6rem;
    }

    .goal-step {
      color: #999;
      padding: 0.2rem 0;
      line-height: 1.4;
    }

    .goal-step.running { color: #c8a060; }
    .goal-step-tool { color: #555; font-size: 0.68rem; }

    #goals-empty {
      padding: 1.5rem 1rem;
      color: #444;
      font-size: 0.82rem;
    }

    /* Analysis log panel */
    #analysis-log-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #analysis-log-btn:hover { color: #90c890; border-color: #90c890; }

    #analysis-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 420px;
      height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid #222;
      flex-direction: column;
      z-index: 100;
    }
    #analysis-panel.open { display: flex; }

    #analysis-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      color: #90c890;
      font-weight: 600;
    }

    #analysis-log-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .analysis-entry {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .analysis-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.8rem;
      color: #90c890;
      margin-bottom: 0.2rem;
    }

    .analysis-entry-time { color: #555; font-size: 0.72rem; }

    .analysis-entry-issues {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.3rem;
    }

    .analysis-issue-item {
      color: #e0a060;
      padding: 0.15rem 0;
    }

    #analysis-empty {
      padding: 1.5rem 1rem;
      color: #444;
      font-size: 0.82rem;
    }

    /* Memory panel */
    #memory-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #memory-btn:hover { color: #7eb8f7; border-color: #7eb8f7; }

    #memory-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid #222;
      flex-direction: column;
      z-index: 100;
    }
    #memory-panel.open { display: flex; }

    #memory-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      color: #7eb8f7;
      font-weight: 600;
    }

    #memory-panel-header .actions {
      display: flex;
      gap: 0.4rem;
    }

    .mem-action-btn {
      font-size: 0.72rem;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .mem-action-btn:hover { color: #e07070; border-color: #e07070; }
    #mem-close-btn:hover { color: #aaa; border-color: #aaa; }

    #memory-filter {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .filter-btn {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      border: 1px solid #333;
      background: none;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { color: #7eb8f7; border-color: #7eb8f7; }

    #memory-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .memory-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
      margin-bottom: 4px;
      border: 1px solid #1a1a1a;
      background: #111;
      font-size: 0.78rem;
    }
    .memory-item:hover { border-color: #2a2a2a; }

    .memory-item .mem-body { flex: 1; min-width: 0; }

    .mem-type {
      font-size: 0.68rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-weight: 600;
      white-space: nowrap;
    }
    .mem-type.episodic { background: #1a2a4a; color: #7eb8f7; }
    .mem-type.semantic { background: #1a3a1a; color: #5db85d; }
    .mem-type.unknown  { background: #2a2a2a; color: #888; }

    .mem-text {
      color: #bbb;
      margin-top: 0.2rem;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .mem-meta {
      color: #444;
      font-size: 0.68rem;
      margin-top: 0.2rem;
    }

    .mem-del-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 0.2rem;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .mem-del-btn:hover { color: #e07070; }

    #memory-empty {
      color: #444;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 2rem;
      display: none;
    }

    /* Tool approval cards */
    .approval-card {
      align-self: flex-start;
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: #1a1200;
      border: 1px solid #6a4a00;
      font-size: 0.85rem;
    }

    .approval-header {
      color: #f0a030;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .approval-args {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 0.6rem;
    }

    .approval-buttons { display: flex; gap: 0.5rem; }

    .approval-allow, .approval-deny {
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      background: none;
      border: 1px solid;
      transition: background 0.15s;
    }
    .approval-allow { color: #5db85d; border-color: #5db85d; }
    .approval-allow:hover { background: #1a3a1a; }
    .approval-deny  { color: #e07070; border-color: #e07070; }
    .approval-deny:hover  { background: #3a1a1a; }
    .approval-allow:disabled, .approval-deny:disabled { opacity: 0.4; cursor: default; }

    .approval-status { font-size: 0.8rem; margin-top: 0.2rem; }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      background: #1a2020;
      border: 1px solid #2a4040;
      color: #90b8b0;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      font-size: 0.78rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
      max-width: 320px;
    }
    #toast.visible { opacity: 1; }

    /* Memory category badges */
    .mem-type.category-pref       { background: #2a1a3a; color: #b07ef7; }
    .mem-type.category-fact       { background: #0d2a2a; color: #5dd0c8; }
    .mem-type.category-correction { background: #2a1a00; color: #f0a030; }
    .mem-type.category-decision   { background: #001a2a; color: #5ab8f7; }
  </style>
</head>
<body>
  <header>
    <span>Oracle</span>
    <div style="display:flex;gap:0.5rem">
      <button id="goals-btn">goals</button>
      <button id="analyze-btn">analyze</button>
      <button id="analysis-log-btn">log</button>
      <button id="memory-btn">memory</button>
      <button id="reset-btn">reset</button>
    </div>
  </header>
  <div id="log"></div>

  <!-- Goals Panel -->
  <div id="goals-panel">
    <div id="goals-panel-header">
      <span>Goals</span>
      <div class="actions">
        <button class="mem-action-btn" id="goals-refresh-btn">refresh</button>
        <button class="mem-action-btn" id="goals-close-btn">✕</button>
      </div>
    </div>
    <div id="goals-new-row">
      <input id="goals-new-input" type="text" placeholder="Add a goal…" />
      <button id="goals-new-btn">add</button>
    </div>
    <div id="goals-list"></div>
    <div id="goals-empty">No goals yet. Goals are captured automatically from conversation or added manually above.</div>
  </div>

  <!-- Analysis Log Panel -->
  <div id="analysis-panel">
    <div id="analysis-panel-header">
      <span>Analysis Log</span>
      <button class="mem-action-btn" id="analysis-close-btn">✕</button>
    </div>
    <div id="analysis-log-list"></div>
    <div id="analysis-empty">No analysis runs recorded yet.</div>
  </div>

  <!-- Memory Panel -->
  <div id="memory-panel">
    <div id="memory-panel-header">
      <span>Memory</span>
      <div class="actions">
        <button class="mem-action-btn" id="mem-refresh-btn">refresh</button>
        <button class="mem-action-btn" id="mem-clear-btn">clear all</button>
        <button class="mem-action-btn" id="mem-close-btn">✕</button>
      </div>
    </div>
    <div id="memory-filter">
      <button class="filter-btn active" data-type="">all</button>
      <button class="filter-btn" data-type="episodic">episodic</button>
      <button class="filter-btn" data-type="semantic">semantic</button>
    </div>
    <div id="memory-list"></div>
    <div id="memory-empty">No memories stored.</div>
  </div>
  <div id="toast"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Say something…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function toolLabel(tool, args) {
      const path = args.path || '';
      const file = path.split(/[/\\]/).pop() || path;
      switch (tool) {
        case 'read_file':    return { name: 'read',    detail: file + (args.offset != null ? ` +${args.offset}` : '') };
        case 'write_file':   return { name: 'write',   detail: file };
        case 'edit_file':    return { name: 'edit',    detail: file };
        case 'run_command':  return { name: '$',        detail: (args.command || '').slice(0, 80) };
        case 'search_regex': return { name: 'search',  detail: `"${(args.pattern || '').slice(0, 50)}"` };
        case 'code_symbols': return { name: 'symbols', detail: file };
        case 'web_fetch':    return { name: 'fetch',   detail: (args.url || '').replace(/^https?:\/\//, '').slice(0, 60) };
        default:             return { name: tool,      detail: '' };
      }
    }

    function buildDiff(oldStr, newStr) {
      const el = document.createElement('div');
      el.className = 'diff-view';
      for (const line of (oldStr || '').split('\n')) {
        const row = document.createElement('div');
        row.className = 'diff-line diff-removed';
        row.innerHTML = `<span class="diff-sign">-</span><span class="diff-text">${escHtml(line)}</span>`;
        el.appendChild(row);
      }
      for (const line of (newStr || '').split('\n')) {
        const row = document.createElement('div');
        row.className = 'diff-line diff-added';
        row.innerHTML = `<span class="diff-sign">+</span><span class="diff-text">${escHtml(line)}</span>`;
        el.appendChild(row);
      }
      return el;
    }

    function addToolActivity(activity) {
      if (!activity?.length) return;
      const wrapper = document.createElement('div');
      wrapper.className = 'tool-block';

      for (const { tool, args = {}, result, denied } of activity) {
        const details = document.createElement('details');
        if (tool === 'edit_file' && !denied) details.open = true;

        const summary = document.createElement('summary');
        const { name, detail } = toolLabel(tool, args);
        summary.innerHTML =
          `<span class="tool-name">${escHtml(name)}</span>` +
          (detail ? `<span class="tool-sep">·</span><span class="tool-detail">${escHtml(detail)}</span>` : '');
        details.appendChild(summary);

        let body;
        if (tool === 'edit_file' && args.old_string != null && args.new_string != null && !denied) {
          body = buildDiff(args.old_string, args.new_string);
        } else {
          body = document.createElement('pre');
          if (denied) {
            body.className = 'denied';
            body.textContent = '✗ denied';
          } else {
            const text = result || '(no output)';
            body.className = text.startsWith('ERROR:') ? 'error' : '';
            body.textContent = text;
          }
        }
        details.appendChild(body);
        wrapper.appendChild(details);
      }

      log.appendChild(wrapper);
      log.scrollTop = log.scrollHeight;
    }

    function addApprovalCard(id, tool, args) {
      const card = document.createElement('div');
      card.className = 'approval-card';

      const argsStr = Object.entries(args || {})
        .map(([k, v]) => {
          const s = typeof v === 'string' ? v : JSON.stringify(v);
          return `${k}: ${s.length > 120 ? s.slice(0, 120) + '…' : s}`;
        })
        .join('\n');

      card.innerHTML = `
        <div class="approval-header">⚠ Allow tool: ${escHtml(tool)}</div>
        <div class="approval-args">${escHtml(argsStr)}</div>
        <div class="approval-buttons">
          <button class="approval-allow">Allow</button>
          <button class="approval-deny">Deny</button>
        </div>`;

      log.appendChild(card);
      log.scrollTop = log.scrollHeight;

      const respond = async (approved) => {
        card.querySelector('.approval-allow').disabled = true;
        card.querySelector('.approval-deny').disabled = true;
        await fetch(`${API}/approve/${encodeURIComponent(id)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ approved }),
        }).catch(() => {});
        const status = document.createElement('div');
        status.className = 'approval-status';
        status.style.color = approved ? '#5db85d' : '#e07070';
        status.textContent = approved ? '✓ Allowed' : '✗ Denied';
        card.querySelector('.approval-buttons').replaceWith(status);
      };

      card.querySelector('.approval-allow').addEventListener('click', () => respond(true));
      card.querySelector('.approval-deny').addEventListener('click', () => respond(false));
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;
      addMsg('user', text);
      const thinking = addMsg('system', 'Oracle is thinking…');

      // Create the assistant bubble immediately so tokens stream into it.
      let assistantBubble = null;
      let toolInserted = false;

      try {
        const res = await fetch(`${API}/message/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          thinking.remove();
          addMsg('system', `Error: ${data.error || res.statusText}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'token') {
              if (!assistantBubble) {
                thinking.remove();
                assistantBubble = addMsg('assistant', '');
              }
              assistantBubble.textContent += event.text;
              log.scrollTop = log.scrollHeight;

            } else if (event.type === 'tool') {
              if (!toolInserted) {
                thinking.remove();
                toolInserted = true;
              }
              addToolActivity(event.activity);

            } else if (event.type === 'approval_required') {
              if (!toolInserted) { thinking.remove(); toolInserted = true; }
              addApprovalCard(event.id, event.tool, event.args);

            } else if (event.type === 'done') {
              // Stream finished normally — nothing extra to do.

            } else if (event.type === 'error') {
              if (assistantBubble) {
                assistantBubble.remove();
              } else {
                thinking.remove();
              }
              addMsg('system', `Error: ${event.message}`);
            }
          }
        }

        // If we never got any tokens (e.g. empty response), clean up thinking indicator.
        if (!assistantBubble && !toolInserted) thinking.remove();

      } catch (e) {
        thinking.remove();
        addMsg('system', `Connection error: ${e.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // ── Toast notifications ────────────────────────────────────────────────────

    const toastEl = document.getElementById('toast');
    let _toastTimer = null;

    function showToast(msg, durationMs = 5000) {
      toastEl.textContent = msg;
      toastEl.classList.add('visible');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toastEl.classList.remove('visible'), durationMs);
    }

    // ── Codebase analysis ──────────────────────────────────────────────────────

    document.getElementById('analyze-btn').addEventListener('click', async () => {
      showToast('Analyzing codebase…', 120_000);
      try {
        const res = await fetch(`${API}/analyze`, { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
          const issueNote = data.issueCount > 0 ? `, ${data.issueCount} issue${data.issueCount > 1 ? 's' : ''} flagged` : '';
          showToast(`Analysis complete — ${data.analyzed} files updated${issueNote}`);
        } else if (data.status === 'skipped') {
          showToast('Analysis: all files up to date');
        } else {
          showToast(`Analysis error: ${data.error || 'unknown'}`);
        }
      } catch (e) {
        showToast(`Analysis failed: ${e.message}`);
      }
    });

    // On load: show toast if a recent analysis exists (startup pass)
    (async () => {
      try {
        const res = await fetch(`${API}/analyze/status`);
        const data = await res.json();
        if (data.status === 'ok' && Date.now() - data.timestamp < 120_000) {
          const issueNote = data.issueCount > 0 ? `, ${data.issueCount} issue${data.issueCount > 1 ? 's' : ''} flagged` : ', no issues';
          showToast(`Codebase analysis ready${issueNote}`);
        }
      } catch {}
    })();

    // ── Goals panel ────────────────────────────────────────────────────────────

    const goalsPanel   = document.getElementById('goals-panel');
    const goalsList    = document.getElementById('goals-list');
    const goalsEmpty   = document.getElementById('goals-empty');
    const goalsBtn     = document.getElementById('goals-btn');

    function goalStatusLabel(status) {
      return { active: 'active', done: 'done', cancelled: 'cancelled' }[status] ?? status;
    }

    function renderGoals(goals) {
      goalsList.innerHTML = '';
      const visible = goals.filter(g => g.status !== 'cancelled');
      goalsEmpty.style.display = visible.length === 0 ? 'block' : 'none';
      goalsBtn.classList.toggle('has-active', goals.some(g => g.status === 'active'));

      for (const goal of visible) {
        const item = document.createElement('div');
        item.className = 'goal-item';
        item.dataset.id = goal.id;

        const header = document.createElement('div');
        header.className = 'goal-header';
        const title  = document.createElement('div');
        title.className = 'goal-title';
        title.textContent = goal.title;
        const badge  = document.createElement('span');
        badge.className = `goal-status ${goal.status}`;
        badge.textContent = goalStatusLabel(goal.status);
        header.appendChild(title);
        header.appendChild(badge);
        item.appendChild(header);

        if (goal.description) {
          const desc = document.createElement('div');
          desc.className = 'goal-desc';
          desc.textContent = goal.description;
          item.appendChild(desc);
        }

        // Step history
        if (goal.steps?.length > 0) {
          const stepsEl = document.createElement('div');
          stepsEl.className = 'goal-steps';
          for (const step of goal.steps) {
            const s = document.createElement('div');
            s.className = 'goal-step';
            s.textContent = step.summary || '(no summary)';
            stepsEl.appendChild(s);
          }
          item.appendChild(stepsEl);
        }

        // Action buttons
        const actions = document.createElement('div');
        actions.className = 'goal-actions';
        if (goal.status === 'active') {
          const exBtn = document.createElement('button');
          exBtn.className = 'goal-btn execute';
          exBtn.textContent = 'execute';
          exBtn.onclick = () => startGoalExecution(goal, item, exBtn);
          actions.appendChild(exBtn);

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'goal-btn cancel';
          cancelBtn.textContent = 'cancel';
          cancelBtn.onclick = async () => {
            await fetch(`${API}/goals/${goal.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'cancelled' }) });
            loadGoals();
          };
          actions.appendChild(cancelBtn);
        }
        const delBtn = document.createElement('button');
        delBtn.className = 'goal-btn';
        delBtn.textContent = 'delete';
        delBtn.onclick = async () => {
          await fetch(`${API}/goals/${goal.id}`, { method: 'DELETE' });
          loadGoals();
        };
        actions.appendChild(delBtn);
        item.appendChild(actions);

        goalsList.appendChild(item);
      }
    }

    async function loadGoals() {
      try {
        const res  = await fetch(`${API}/goals`);
        const goals = await res.json();
        renderGoals(Array.isArray(goals) ? goals : []);
      } catch (e) {
        goalsEmpty.textContent = `Failed to load goals: ${e.message}`;
        goalsEmpty.style.display = 'block';
      }
    }

    function startGoalExecution(goal, itemEl, executeBtn) {
      executeBtn.disabled = true;
      executeBtn.textContent = 'running…';

      // Clear old steps from the goal item and add a live steps container
      let stepsEl = itemEl.querySelector('.goal-steps');
      if (!stepsEl) {
        stepsEl = document.createElement('div');
        stepsEl.className = 'goal-steps';
        itemEl.insertBefore(stepsEl, itemEl.querySelector('.goal-actions'));
      }
      stepsEl.innerHTML = '';

      const es = new EventSource(`${API}/goals/${goal.id}/execute`);

      es.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);

          if (ev.type === 'step') {
            const stepEl = document.createElement('div');
            stepEl.className = 'goal-step';
            stepEl.textContent = `${ev.index}. ${ev.summary}`;
            stepsEl.appendChild(stepEl);

            if (ev.toolResults?.length) {
              ev.toolResults.forEach(tr => {
                const t = document.createElement('div');
                t.className = 'goal-step-tool';
                t.textContent = `  ⚙ ${tr.tool}`;
                stepsEl.appendChild(t);
              });
            }

            if (ev.done) {
              executeBtn.textContent = 'done';
              const badge = itemEl.querySelector('.goal-status');
              if (badge) { badge.className = 'goal-status done'; badge.textContent = 'done'; }
            }
          }

          if (ev.type === 'done') {
            es.close();
            loadGoals();
          }

          if (ev.type === 'error') {
            es.close();
            executeBtn.disabled = false;
            executeBtn.textContent = 'execute';
            const errEl = document.createElement('div');
            errEl.className = 'goal-step';
            errEl.style.color = '#e07070';
            errEl.textContent = `Error: ${ev.message}`;
            stepsEl.appendChild(errEl);
          }
        } catch {}
      };

      es.onerror = () => {
        es.close();
        executeBtn.disabled = false;
        executeBtn.textContent = 'execute';
      };
    }

    document.getElementById('goals-btn').addEventListener('click', () => {
      goalsPanel.classList.toggle('open');
      if (goalsPanel.classList.contains('open')) loadGoals();
    });
    document.getElementById('goals-close-btn').addEventListener('click', () => goalsPanel.classList.remove('open'));
    document.getElementById('goals-refresh-btn').addEventListener('click', loadGoals);

    document.getElementById('goals-new-btn').addEventListener('click', async () => {
      const input = document.getElementById('goals-new-input');
      const title = input.value.trim();
      if (!title) return;
      await fetch(`${API}/goals`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
      input.value = '';
      loadGoals();
    });

    document.getElementById('goals-new-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('goals-new-btn').click();
    });

    // Poll goals count to highlight button when active goals exist
    setInterval(async () => {
      try {
        const res = await fetch(`${API}/goals`);
        const goals = await res.json();
        goalsBtn.classList.toggle('has-active', Array.isArray(goals) && goals.some(g => g.status === 'active'));
      } catch {}
    }, 30_000);

    // ── Analysis log panel ─────────────────────────────────────────────────────

    const analysisPanel  = document.getElementById('analysis-panel');
    const analysisLogList = document.getElementById('analysis-log-list');
    const analysisEmpty  = document.getElementById('analysis-empty');

    function formatTs(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    async function loadAnalysisLog() {
      try {
        const res = await fetch(`${API}/analyze/log`);
        const { entries } = await res.json();
        analysisLogList.innerHTML = '';
        if (!entries || entries.length === 0) {
          analysisEmpty.style.display = 'block';
          return;
        }
        analysisEmpty.style.display = 'none';
        for (const entry of entries) {
          const div = document.createElement('div');
          div.className = 'analysis-entry';

          const header = document.createElement('div');
          header.className = 'analysis-entry-header';
          const stat = entry.analyzed > 0
            ? `${entry.analyzed} updated / ${entry.total} total`
            : `${entry.total} files, nothing changed`;
          header.innerHTML = `<span>${stat}${entry.issueCount > 0 ? ` · <span style="color:#e0a060">${entry.issueCount} issue${entry.issueCount > 1 ? 's' : ''}</span>` : ''}</span><span class="analysis-entry-time">${formatTs(entry.timestamp)}</span>`;
          div.appendChild(header);

          if (entry.issues && entry.issues.length > 0) {
            const issueBlock = document.createElement('div');
            issueBlock.className = 'analysis-entry-issues';
            for (const issue of entry.issues) {
              const item = document.createElement('div');
              item.className = 'analysis-issue-item';
              item.textContent = issue.replace(/\*\*/g, '');
              issueBlock.appendChild(item);
            }
            div.appendChild(issueBlock);
          }

          analysisLogList.appendChild(div);
        }
      } catch (e) {
        analysisEmpty.textContent = `Failed to load: ${e.message}`;
        analysisEmpty.style.display = 'block';
      }
    }

    document.getElementById('analysis-log-btn').addEventListener('click', () => {
      analysisPanel.classList.toggle('open');
      if (analysisPanel.classList.contains('open')) loadAnalysisLog();
    });

    document.getElementById('analysis-close-btn').addEventListener('click', () => {
      analysisPanel.classList.remove('open');
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Reset conversation? This clears the current chat history.')) return;
      try {
        await fetch(`${API}/reset`, { method: 'POST' });
        log.innerHTML = '';
        addMsg('system', 'Conversation reset.');
      } catch (e) {
        addMsg('system', `Reset failed: ${e.message}`);
      }
    });

    // ── Memory panel ──────────────────────────────────────────────────────────

    const memoryPanel = document.getElementById('memory-panel');
    const memoryList  = document.getElementById('memory-list');
    const memoryEmpty = document.getElementById('memory-empty');
    let memFilter = '';

    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    async function loadMemories() {
      memoryList.innerHTML = '';
      memoryEmpty.style.display = 'none';
      try {
        const url = memFilter ? `${API}/memory?type=${memFilter}` : `${API}/memory`;
        const data = await fetch(url).then(r => r.json());
        const memories = data.memories || [];
        if (memories.length === 0) {
          memoryEmpty.style.display = 'block';
          return;
        }
        // Show newest first
        [...memories].reverse().forEach(mem => {
          const item = document.createElement('div');
          item.className = 'memory-item';
          item.dataset.id = mem.id;

          const categoryClassMap = {
            USER_PREFERENCE: 'category-pref',
            USER_FACT: 'category-fact',
            BEHAVIORAL_CORRECTION: 'category-correction',
            PROJECT_DECISION: 'category-decision',
          };
          const typeClass = mem.category
            ? (categoryClassMap[mem.category] || 'semantic')
            : (['episodic', 'semantic'].includes(mem.type) ? mem.type : 'unknown');
          const badgeLabel = mem.category
            ? mem.category.toLowerCase().replace(/_/g, ' ')
            : mem.type;
          item.innerHTML = `
            <div class="mem-body">
              <span class="mem-type ${typeClass}">${escHtml(badgeLabel)}</span>
              <div class="mem-text">${escHtml(mem.text)}</div>
              <div class="mem-meta">${formatDate(mem.timestamp)}</div>
            </div>
            <button class="mem-del-btn" title="Delete">×</button>
          `;
          item.querySelector('.mem-del-btn').addEventListener('click', () => deleteMemory(mem.id, item));
          memoryList.appendChild(item);
        });
      } catch (e) {
        memoryEmpty.textContent = `Error loading memories: ${e.message}`;
        memoryEmpty.style.display = 'block';
      }
    }

    async function deleteMemory(id, itemEl) {
      try {
        const res = await fetch(`${API}/memory/${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (res.ok) {
          itemEl.remove();
          if (memoryList.children.length === 0) memoryEmpty.style.display = 'block';
        }
      } catch (e) {
        addMsg('system', `Delete failed: ${e.message}`);
      }
    }

    document.getElementById('memory-btn').addEventListener('click', () => {
      memoryPanel.classList.add('open');
      loadMemories();
    });

    document.getElementById('mem-close-btn').addEventListener('click', () => {
      memoryPanel.classList.remove('open');
    });

    document.getElementById('mem-refresh-btn').addEventListener('click', loadMemories);

    document.getElementById('mem-clear-btn').addEventListener('click', async () => {
      if (!confirm('Delete ALL memories? This cannot be undone.')) return;
      try {
        await fetch(`${API}/memory`, { method: 'DELETE' });
        await loadMemories();
      } catch (e) {
        addMsg('system', `Clear failed: ${e.message}`);
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        memFilter = btn.dataset.type;
        loadMemories();
      });
    });

    // Restore conversation history on page load
    (async () => {
      try {
        const res = await fetch(`${API}/history`);
        const data = await res.json();
        if (data.history?.length) {
          for (const msg of data.history) {
            if (msg.role === 'user' || msg.role === 'assistant') {
              addMsg(msg.role, msg.content);
            }
          }
        }
      } catch (e) {
        console.warn('Could not restore history:', e.message);
      }
    })();
  </script>
</body>
</html>
