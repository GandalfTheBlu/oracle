<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #222;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #7eb8f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #reset-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #reset-btn:hover { color: #e07070; border-color: #e07070; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 75%;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #d6eaff;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
    }

    .msg.system {
      align-self: center;
      color: #555;
      font-size: 0.8rem;
      font-style: italic;
      background: none;
    }

    .tool-block {
      align-self: flex-start;
      font-size: 0.78rem;
      width: 100%;
      max-width: 90%;
    }

    .tool-block details {
      background: #111;
      border: 1px solid #1e3a1e;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .tool-block summary {
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      color: #5db85d;
      user-select: none;
      list-style: none;
    }

    .tool-block summary::before { content: '⚙ '; }

    .tool-block pre {
      padding: 0.5rem 0.7rem;
      color: #aaa;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      border-top: 1px solid #1e3a1e;
      font-size: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #222;
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 200px;
    }

    #input:focus { border-color: #7eb8f7; }

    #send {
      background: #1a3a5c;
      color: #7eb8f7;
      border: none;
      border-radius: 8px;
      padding: 0 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #1e4a78; }
    #send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <span>Oracle</span>
    <button id="reset-btn">reset</button>
  </header>
  <div id="log"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Say something…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function addToolActivity(activity) {
      if (!activity || activity.length === 0) return;
      const wrapper = document.createElement('div');
      wrapper.className = 'tool-block';
      for (const { tool, args, result } of activity) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        const argsStr = Object.entries(args || {}).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(' ');
        summary.textContent = `${tool}(${argsStr})`;
        const pre = document.createElement('pre');
        pre.textContent = result || '(no output)';
        details.appendChild(summary);
        details.appendChild(pre);
        wrapper.appendChild(details);
      }
      log.appendChild(wrapper);
      log.scrollTop = log.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;
      addMsg('user', text);
      const thinking = addMsg('system', 'Oracle is thinking…');

      // Create the assistant bubble immediately so tokens stream into it.
      let assistantBubble = null;
      let toolInserted = false;

      try {
        const res = await fetch(`${API}/message/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          thinking.remove();
          addMsg('system', `Error: ${data.error || res.statusText}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'token') {
              if (!assistantBubble) {
                thinking.remove();
                assistantBubble = addMsg('assistant', '');
              }
              assistantBubble.textContent += event.text;
              log.scrollTop = log.scrollHeight;

            } else if (event.type === 'tool') {
              if (!toolInserted) {
                thinking.remove();
                toolInserted = true;
              }
              addToolActivity(event.activity);

            } else if (event.type === 'done') {
              // Stream finished normally — nothing extra to do.

            } else if (event.type === 'error') {
              if (assistantBubble) {
                assistantBubble.remove();
              } else {
                thinking.remove();
              }
              addMsg('system', `Error: ${event.message}`);
            }
          }
        }

        // If we never got any tokens (e.g. empty response), clean up thinking indicator.
        if (!assistantBubble && !toolInserted) thinking.remove();

      } catch (e) {
        thinking.remove();
        addMsg('system', `Connection error: ${e.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Reset conversation? This clears the current chat history.')) return;
      try {
        await fetch(`${API}/reset`, { method: 'POST' });
        log.innerHTML = '';
        addMsg('system', 'Conversation reset.');
      } catch (e) {
        addMsg('system', `Reset failed: ${e.message}`);
      }
    });
  </script>
</body>
</html>
