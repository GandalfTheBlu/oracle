<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #222;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #7eb8f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #reset-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #reset-btn:hover { color: #e07070; border-color: #e07070; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 75%;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #d6eaff;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
    }

    .msg.system {
      align-self: center;
      color: #555;
      font-size: 0.8rem;
      font-style: italic;
      background: none;
    }

    .tool-block {
      align-self: flex-start;
      font-size: 0.78rem;
      width: 100%;
      max-width: 90%;
    }

    .tool-block details {
      background: #111;
      border: 1px solid #1e3a1e;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .tool-block summary {
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      color: #5db85d;
      user-select: none;
      list-style: none;
    }

    .tool-block summary::before { content: '⚙ '; }

    .tool-block pre {
      padding: 0.5rem 0.7rem;
      color: #aaa;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      border-top: 1px solid #1e3a1e;
      font-size: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #222;
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 200px;
    }

    #input:focus { border-color: #7eb8f7; }

    #send {
      background: #1a3a5c;
      color: #7eb8f7;
      border: none;
      border-radius: 8px;
      padding: 0 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #1e4a78; }
    #send:disabled { opacity: 0.5; cursor: default; }

    /* Memory panel */
    #memory-btn {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #memory-btn:hover { color: #7eb8f7; border-color: #7eb8f7; }

    #memory-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid #222;
      flex-direction: column;
      z-index: 100;
    }
    #memory-panel.open { display: flex; }

    #memory-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      color: #7eb8f7;
      font-weight: 600;
    }

    #memory-panel-header .actions {
      display: flex;
      gap: 0.4rem;
    }

    .mem-action-btn {
      font-size: 0.72rem;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .mem-action-btn:hover { color: #e07070; border-color: #e07070; }
    #mem-close-btn:hover { color: #aaa; border-color: #aaa; }

    #memory-filter {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .filter-btn {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      border: 1px solid #333;
      background: none;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { color: #7eb8f7; border-color: #7eb8f7; }

    #memory-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .memory-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
      margin-bottom: 4px;
      border: 1px solid #1a1a1a;
      background: #111;
      font-size: 0.78rem;
    }
    .memory-item:hover { border-color: #2a2a2a; }

    .memory-item .mem-body { flex: 1; min-width: 0; }

    .mem-type {
      font-size: 0.68rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-weight: 600;
      white-space: nowrap;
    }
    .mem-type.episodic { background: #1a2a4a; color: #7eb8f7; }
    .mem-type.semantic { background: #1a3a1a; color: #5db85d; }
    .mem-type.unknown  { background: #2a2a2a; color: #888; }

    .mem-text {
      color: #bbb;
      margin-top: 0.2rem;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .mem-meta {
      color: #444;
      font-size: 0.68rem;
      margin-top: 0.2rem;
    }

    .mem-del-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 0.2rem;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .mem-del-btn:hover { color: #e07070; }

    #memory-empty {
      color: #444;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 2rem;
      display: none;
    }

    /* Tool approval cards */
    .approval-card {
      align-self: flex-start;
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: #1a1200;
      border: 1px solid #6a4a00;
      font-size: 0.85rem;
    }

    .approval-header {
      color: #f0a030;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .approval-args {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 0.6rem;
    }

    .approval-buttons { display: flex; gap: 0.5rem; }

    .approval-allow, .approval-deny {
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      background: none;
      border: 1px solid;
      transition: background 0.15s;
    }
    .approval-allow { color: #5db85d; border-color: #5db85d; }
    .approval-allow:hover { background: #1a3a1a; }
    .approval-deny  { color: #e07070; border-color: #e07070; }
    .approval-deny:hover  { background: #3a1a1a; }
    .approval-allow:disabled, .approval-deny:disabled { opacity: 0.4; cursor: default; }

    .approval-status { font-size: 0.8rem; margin-top: 0.2rem; }

    /* Memory category badges */
    .mem-type.category-pref       { background: #2a1a3a; color: #b07ef7; }
    .mem-type.category-fact       { background: #0d2a2a; color: #5dd0c8; }
    .mem-type.category-correction { background: #2a1a00; color: #f0a030; }
    .mem-type.category-decision   { background: #001a2a; color: #5ab8f7; }
  </style>
</head>
<body>
  <header>
    <span>Oracle</span>
    <div style="display:flex;gap:0.5rem">
      <button id="memory-btn">memory</button>
      <button id="reset-btn">reset</button>
    </div>
  </header>
  <div id="log"></div>

  <!-- Memory Panel -->
  <div id="memory-panel">
    <div id="memory-panel-header">
      <span>Memory</span>
      <div class="actions">
        <button class="mem-action-btn" id="mem-refresh-btn">refresh</button>
        <button class="mem-action-btn" id="mem-clear-btn">clear all</button>
        <button class="mem-action-btn" id="mem-close-btn">✕</button>
      </div>
    </div>
    <div id="memory-filter">
      <button class="filter-btn active" data-type="">all</button>
      <button class="filter-btn" data-type="episodic">episodic</button>
      <button class="filter-btn" data-type="semantic">semantic</button>
    </div>
    <div id="memory-list"></div>
    <div id="memory-empty">No memories stored.</div>
  </div>
  <div id="input-row">
    <textarea id="input" placeholder="Say something…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function addToolActivity(activity) {
      if (!activity || activity.length === 0) return;
      const wrapper = document.createElement('div');
      wrapper.className = 'tool-block';
      for (const { tool, args, result } of activity) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        const argsStr = Object.entries(args || {}).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(' ');
        summary.textContent = `${tool}(${argsStr})`;
        const pre = document.createElement('pre');
        pre.textContent = result || '(no output)';
        details.appendChild(summary);
        details.appendChild(pre);
        wrapper.appendChild(details);
      }
      log.appendChild(wrapper);
      log.scrollTop = log.scrollHeight;
    }

    function addApprovalCard(id, tool, args) {
      const card = document.createElement('div');
      card.className = 'approval-card';

      const argsStr = Object.entries(args || {})
        .map(([k, v]) => {
          const s = typeof v === 'string' ? v : JSON.stringify(v);
          return `${k}: ${s.length > 120 ? s.slice(0, 120) + '…' : s}`;
        })
        .join('\n');

      card.innerHTML = `
        <div class="approval-header">⚠ Allow tool: ${escHtml(tool)}</div>
        <div class="approval-args">${escHtml(argsStr)}</div>
        <div class="approval-buttons">
          <button class="approval-allow">Allow</button>
          <button class="approval-deny">Deny</button>
        </div>`;

      log.appendChild(card);
      log.scrollTop = log.scrollHeight;

      const respond = async (approved) => {
        card.querySelector('.approval-allow').disabled = true;
        card.querySelector('.approval-deny').disabled = true;
        await fetch(`${API}/approve/${encodeURIComponent(id)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ approved }),
        }).catch(() => {});
        const status = document.createElement('div');
        status.className = 'approval-status';
        status.style.color = approved ? '#5db85d' : '#e07070';
        status.textContent = approved ? '✓ Allowed' : '✗ Denied';
        card.querySelector('.approval-buttons').replaceWith(status);
      };

      card.querySelector('.approval-allow').addEventListener('click', () => respond(true));
      card.querySelector('.approval-deny').addEventListener('click', () => respond(false));
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;
      addMsg('user', text);
      const thinking = addMsg('system', 'Oracle is thinking…');

      // Create the assistant bubble immediately so tokens stream into it.
      let assistantBubble = null;
      let toolInserted = false;

      try {
        const res = await fetch(`${API}/message/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          thinking.remove();
          addMsg('system', `Error: ${data.error || res.statusText}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'token') {
              if (!assistantBubble) {
                thinking.remove();
                assistantBubble = addMsg('assistant', '');
              }
              assistantBubble.textContent += event.text;
              log.scrollTop = log.scrollHeight;

            } else if (event.type === 'tool') {
              if (!toolInserted) {
                thinking.remove();
                toolInserted = true;
              }
              addToolActivity(event.activity);

            } else if (event.type === 'approval_required') {
              if (!toolInserted) { thinking.remove(); toolInserted = true; }
              addApprovalCard(event.id, event.tool, event.args);

            } else if (event.type === 'done') {
              // Stream finished normally — nothing extra to do.

            } else if (event.type === 'error') {
              if (assistantBubble) {
                assistantBubble.remove();
              } else {
                thinking.remove();
              }
              addMsg('system', `Error: ${event.message}`);
            }
          }
        }

        // If we never got any tokens (e.g. empty response), clean up thinking indicator.
        if (!assistantBubble && !toolInserted) thinking.remove();

      } catch (e) {
        thinking.remove();
        addMsg('system', `Connection error: ${e.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Reset conversation? This clears the current chat history.')) return;
      try {
        await fetch(`${API}/reset`, { method: 'POST' });
        log.innerHTML = '';
        addMsg('system', 'Conversation reset.');
      } catch (e) {
        addMsg('system', `Reset failed: ${e.message}`);
      }
    });

    // ── Memory panel ──────────────────────────────────────────────────────────

    const memoryPanel = document.getElementById('memory-panel');
    const memoryList  = document.getElementById('memory-list');
    const memoryEmpty = document.getElementById('memory-empty');
    let memFilter = '';

    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    async function loadMemories() {
      memoryList.innerHTML = '';
      memoryEmpty.style.display = 'none';
      try {
        const url = memFilter ? `${API}/memory?type=${memFilter}` : `${API}/memory`;
        const data = await fetch(url).then(r => r.json());
        const memories = data.memories || [];
        if (memories.length === 0) {
          memoryEmpty.style.display = 'block';
          return;
        }
        // Show newest first
        [...memories].reverse().forEach(mem => {
          const item = document.createElement('div');
          item.className = 'memory-item';
          item.dataset.id = mem.id;

          const categoryClassMap = {
            USER_PREFERENCE: 'category-pref',
            USER_FACT: 'category-fact',
            BEHAVIORAL_CORRECTION: 'category-correction',
            PROJECT_DECISION: 'category-decision',
          };
          const typeClass = mem.category
            ? (categoryClassMap[mem.category] || 'semantic')
            : (['episodic', 'semantic'].includes(mem.type) ? mem.type : 'unknown');
          const badgeLabel = mem.category
            ? mem.category.toLowerCase().replace(/_/g, ' ')
            : mem.type;
          item.innerHTML = `
            <div class="mem-body">
              <span class="mem-type ${typeClass}">${escHtml(badgeLabel)}</span>
              <div class="mem-text">${escHtml(mem.text)}</div>
              <div class="mem-meta">${formatDate(mem.timestamp)}</div>
            </div>
            <button class="mem-del-btn" title="Delete">×</button>
          `;
          item.querySelector('.mem-del-btn').addEventListener('click', () => deleteMemory(mem.id, item));
          memoryList.appendChild(item);
        });
      } catch (e) {
        memoryEmpty.textContent = `Error loading memories: ${e.message}`;
        memoryEmpty.style.display = 'block';
      }
    }

    async function deleteMemory(id, itemEl) {
      try {
        const res = await fetch(`${API}/memory/${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (res.ok) {
          itemEl.remove();
          if (memoryList.children.length === 0) memoryEmpty.style.display = 'block';
        }
      } catch (e) {
        addMsg('system', `Delete failed: ${e.message}`);
      }
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.getElementById('memory-btn').addEventListener('click', () => {
      memoryPanel.classList.add('open');
      loadMemories();
    });

    document.getElementById('mem-close-btn').addEventListener('click', () => {
      memoryPanel.classList.remove('open');
    });

    document.getElementById('mem-refresh-btn').addEventListener('click', loadMemories);

    document.getElementById('mem-clear-btn').addEventListener('click', async () => {
      if (!confirm('Delete ALL memories? This cannot be undone.')) return;
      try {
        await fetch(`${API}/memory`, { method: 'DELETE' });
        await loadMemories();
      } catch (e) {
        addMsg('system', `Clear failed: ${e.message}`);
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        memFilter = btn.dataset.type;
        loadMemories();
      });
    });
  </script>
</body>
</html>
